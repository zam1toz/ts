<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국도로공사 - 하이패스 내역 일괄 추출</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        html { font-size: 62.5%; }
        body { 
            font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; 
            font-size: 1.6rem; color: #222; line-height: 1.5;
            background-color: #f4f7f9; margin: 0; padding: 40px 20px;
        }
        *, *:before, *:after { -webkit-box-sizing: border-box; box-sizing: border-box; }

        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 30px; border: 1px solid #e1e1e1; }
        
        .control-panel { 
            display: flex; justify-content: space-between; align-items: center;
            background-color: #f8f9fa; border: 1px solid #ced4da; padding: 20px; 
            margin-bottom: 20px; border-radius: 5px; 
        }
        .btn-all-save { 
            padding: 10px 24px; background-color: #26408a; color: #fff; border: none; 
            border-radius: 4px; cursor: pointer; font-size: 1.6rem; font-weight: 500;
        }

        .cm_table01 { width: 100%; border-top: 1px solid #333; border-collapse: collapse; table-layout: fixed; border-left: 0; border-right: 0; }
        
        .cm_table01 th { 
            background-color: #f1f6f9; color: #333; font-weight: 500; font-size: 1.6rem; 
            padding: 12px 5px; border: 1px solid #d1d9e0; text-align: center;
        }
        .cm_table01 th:first-child { border-left: 0; }
        .cm_table01 th:last-child { border-right: 0; }

        .cm_table01 td { 
            padding: 12px 10px; border: 1px solid #d1d9e0; text-align: center; 
            font-size: 1.6rem; color: #222222; vertical-align: middle; line-height: 1.4; 
            background-color: #ffffff;
        }
        .cm_table01 td:first-child { border-left: 0; }
        .cm_table01 td:last-child { border-right: 0; }

        .td-num, .td-date, .td-card { font-family: 'Montserrat', 'Noto Sans KR', sans-serif; letter-spacing: -0.02rem; }
        .td-date strong { display: block; font-weight: 400; margin-bottom: 2px; }

        /* [수정] 돋보기가 잘리지 않도록 inline-flex와 충분한 padding 부여 */
        .cm_view01 { 
            color: #26408a; text-decoration: none; font-weight: 500; 
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; padding-right: 5px; /* 우측 여백 확보 */
        }
        .icon-search-wrapper { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
        .icon-search-wrapper svg { width: 20px; height: 20px; }

        .info-text { font-size: 1.2rem; color: #ef5350; text-align: right; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>하이패스 사용내역 일괄 추출 (돋보기 잘림 보정)</h2>
    
    <div class="control-panel">
        <div>
            <strong>CSV 파일 업로드: </strong>
            <input type="file" id="csvFile" accept=".csv">
        </div>
        <button id="saveAllBtn" class="btn-all-save" disabled>모든 행 이미지 저장</button>
    </div>

    <p class="info-text">※ 돋보기 아이콘이 잘리지 않도록 캡처 여백 로직을 강화했습니다.</p>
    
    <table class="cm_table01">
        <colgroup>
            <col style="width:40px;"><col style="width:60px;"><col style="width:140px;">
            <col style="width:180px;"><col style="width:100px;"><col style="width:70px;">
            <col style="width:100px;"><col style="width:100px;"><col style="width:120px;">
            <col style="width:130px;"><col style="width:120px;">
        </colgroup>
        <thead>
            <tr>
                <th><input type="checkbox"></th>
                <th>No</th>
                <th>거래일시</th>
                <th>하이패스 카드</th>
                <th>카드별칭</th>
                <th>차종</th>
                <th>입구영업소</th>
                <th>출구영업소</th>
                <th>이용차로</th>
                <th>거래금액</th>
                <th>청구일자</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="11" style="padding:60px; color:#999;">CSV 파일을 업로드해주세요.</td></tr>
        </tbody>
    </table>
</div>

<script>
    // 돋보기 SVG (파란 원형 + 흰색 플러스)
    const searchIconSvg = `
        <div class="icon-search-wrapper">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="11" cy="11" r="9" stroke="#0095e0" stroke-width="1.5" fill="none"/>
                <line x1="11" y1="7" x2="11" y2="15" stroke="#0095e0" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="7" y1="11" x2="15" y2="11" stroke="#0095e0" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="18" y1="18" x2="22" y2="22" stroke="#0095e0" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </div>`;

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            processCSV(e.target.result);
            document.getElementById('saveAllBtn').disabled = false;
        };
        reader.readAsText(file, 'EUC-KR');
    });

    function processCSV(csvText) {
        const lines = csvText.trim().split(/\r?\n/);
        const tbody = document.getElementById('tableBody');
        let html = '';

        for (let i = 1; i < lines.length; i++) {
            const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (row.length < 5) continue;

            const no = row[0].replace(/"/g, '').trim();
            const datePart = row[1].replace(/"/g, '').trim().replace(/-/g, '/');
            
            let timePart = row[2] ? row[2].replace(/"/g, '').trim() : '';
            if (timePart) {
                const ts = timePart.split(':');
                if (ts.length >= 2) timePart = `${ts[0].padStart(2, '0')}:${ts[1].padStart(2, '0')}`;
            }

            const amount = Number(row[9].replace(/[^0-9]/g, '')).toLocaleString();
            const billDate = row[10] ? row[10].replace(/"/g, '').trim().replace(/-/g, '/') : '';

            html += `
                <tr id="row-tr-${i}">
                    <td><input type="checkbox"></td>
                    <td class="td-num">${no}</td>
                    <td class="td-date"><strong>${datePart}</strong>${timePart}</td>
                    <td class="td-card">[후불]<br>${row[3].replace(/"/g, '')}</td>
                    <td>${row[4].replace(/"/g, '')}</td>
                    <td>${row[5].replace(/"/g, '')}</td>
                    <td>${row[6].replace(/"/g, '')}</td>
                    <td>${row[7].replace(/"/g, '')}</td>
                    <td>${row[8].replace(/"/g, '')}</td>
                    <td>
                        <span class="cm_view01">${amount}원${searchIconSvg}</span>
                    </td>
                    <td class="td-num">${billDate}</td>
                </tr>`;
        }
        tbody.innerHTML = html;
    }

    document.getElementById('saveAllBtn').addEventListener('click', async function() {
        const rows = document.querySelectorAll('#tableBody tr');
        if (rows.length === 0 || rows[0].id === "") return;
        this.disabled = true;
        const btnText = this.innerText;

        for (let i = 0; i < rows.length; i++) {
            this.innerText = `저장 중 (${i + 1}/${rows.length})...`;
            await saveRowAsImage(rows[i], rows[i].cells[1].innerText);
        }

        this.disabled = false;
        this.innerText = btnText;
        alert("일괄 저장이 완료되었습니다.");
    });

    async function saveRowAsImage(el, no) {
        // [수정] 캡처 전 폰트 및 이미지가 완전히 렌더링되도록 미세 대기
        await new Promise(res => setTimeout(res, 100));

        return html2canvas(el, { 
            backgroundColor: "#ffffff", 
            scale: 3,
            useCORS: true, 
            allowTaint: true,
            scrollX: 0,
            scrollY: -window.scrollY, // 스크롤 위치 보정
            width: el.offsetWidth + 2, // 가로 잘림 방지 (여유공간)
            logging: false 
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `하이패스_${no}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            return new Promise(res => setTimeout(res, 500));
        });
    }
</script>

</body>
</html>
